name: 📧 Notifier le Client

on:
  push:
    branches: [main]
    paths:
      - "ROADMAP.md"
      - "plan.html"
      - "index.html"

jobs:
  notify:
    name: Calculer la progression & Envoyer l'email
    runs-on: ubuntu-latest

    steps:
      # ── 1. Récupérer le code ──────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── 2. Calculer la progression ────────────────────
      - name: Calculer progression
        id: progress
        run: |
          # Compter les tâches cochées
          DONE=$(grep -c '- \[x\]' ROADMAP.md 2>/dev/null || echo 0)
          # Compter les tâches non cochées
          TODO=$(grep -c '- \[ \]' ROADMAP.md 2>/dev/null || echo 0)
          TOTAL=$((DONE + TODO))
          # Pourcentage (éviter division par zéro)
          if [ "$TOTAL" -gt "0" ]; then
            PCT=$((DONE * 100 / TOTAL))
          else
            PCT=0
          fi
          # Récupérer le message du dernier commit
          MSG=$(git log -1 --pretty=format:"%s" HEAD)
          # Récupérer l'auteur
          AUTHOR=$(git log -1 --pretty=format:"%an" HEAD)
          # Récupérer la date formatée
          DATE=$(git log -1 --pretty=format:"%cd" --date=format:"%d/%m/%Y à %H:%M" HEAD)

          echo "done=$DONE"    >> $GITHUB_OUTPUT
          echo "todo=$TODO"    >> $GITHUB_OUTPUT
          echo "total=$TOTAL"  >> $GITHUB_OUTPUT
          echo "pct=$PCT"      >> $GITHUB_OUTPUT
          echo "msg=$MSG"      >> $GITHUB_OUTPUT
          echo "author=$AUTHOR">> $GITHUB_OUTPUT
          echo "date=$DATE"    >> $GITHUB_OUTPUT

          echo "✅ Progression: $DONE/$TOTAL ($PCT%)"
          echo "📝 Commit: $MSG"

      # ── 3. Déterminer la couleur selon % ──────────────
      - name: Couleur & message selon avancement
        id: style
        run: |
          PCT=${{ steps.progress.outputs.pct }}
          if   [ "$PCT" -lt "25" ]; then COLOR="#1d4ed8"; PHASE="Démarrage"; EMOJI="🏗️"
          elif [ "$PCT" -lt "50" ]; then COLOR="#6d28d9"; PHASE="En cours"; EMOJI="⚙️"
          elif [ "$PCT" -lt "75" ]; then COLOR="#0369a1"; PHASE="Progression"; EMOJI="🚀"
          elif [ "$PCT" -lt "100" ]; then COLOR="#d97706"; PHASE="Finalisation"; EMOJI="🎯"
          else COLOR="#16a34a"; PHASE="Terminé !"; EMOJI="🎉"; fi

          # Barres de progression en ASCII
          BARS=$((PCT / 10))
          BAR_HTML=""
          for i in $(seq 1 10); do
            if [ "$i" -le "$BARS" ]; then
              BAR_HTML="${BAR_HTML}<span style='display:inline-block;width:20px;height:12px;background:${COLOR};border-radius:3px;margin:1px;'></span>"
            else
              BAR_HTML="${BAR_HTML}<span style='display:inline-block;width:20px;height:12px;background:#e2e8f0;border-radius:3px;margin:1px;'></span>"
            fi
          done

          echo "color=$COLOR"    >> $GITHUB_OUTPUT
          echo "phase=$PHASE"    >> $GITHUB_OUTPUT
          echo "emoji=$EMOJI"    >> $GITHUB_OUTPUT
          echo "barhtml=$BAR_HTML" >> $GITHUB_OUTPUT

      # ── 4. Envoyer l'email ────────────────────────────
      - name: Envoyer notification email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_SENDER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "${{ steps.progress.outputs.emoji }} LogiSaaS — Nouvelle étape : ${{ steps.progress.outputs.pct }}% complété"
          to: ${{ secrets.CLIENT_EMAIL }}
          from: "LogiSaaS Dev Team <${{ secrets.EMAIL_SENDER }}>"
          content_type: text/html
          body: |
            <!DOCTYPE html>
            <html lang="fr">
            <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
            <body style="margin:0;padding:0;background:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;">
              <div style="max-width:600px;margin:0 auto;padding:24px;">

                <!-- Header -->
                <div style="background:linear-gradient(135deg,#0f2044,#1d4ed8,#6d28d9);border-radius:16px 16px 0 0;padding:40px;text-align:center;">
                  <div style="font-size:48px;margin-bottom:8px;">🚢</div>
                  <div style="color:white;font-size:28px;font-weight:900;letter-spacing:-1px;">LogiSaaS Platform</div>
                  <div style="color:rgba(255,255,255,0.8);font-size:15px;margin-top:6px;">Mise à jour de progression du projet</div>
                </div>

                <!-- Body -->
                <div style="background:white;border-radius:0 0 16px 16px;border:1px solid #e2e8f0;border-top:none;padding:40px;">

                  <!-- Alert -->
                  <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:16px 20px;margin-bottom:28px;display:flex;align-items:center;gap:12px;">
                    <span style="font-size:24px;">✅</span>
                    <div>
                      <div style="font-weight:700;color:#15803d;font-size:15px;">Nouvelle étape franchie !</div>
                      <div style="color:#166534;font-size:13px;margin-top:2px;">${{ steps.progress.outputs.msg }}</div>
                    </div>
                  </div>

                  <!-- Big percentage -->
                  <div style="text-align:center;margin-bottom:32px;">
                    <div style="font-size:80px;font-weight:900;color:${{ steps.style.outputs.color }};line-height:1;">${{ steps.progress.outputs.pct }}<span style="font-size:36px;">%</span></div>
                    <div style="color:#64748b;font-size:16px;margin-top:4px;">Complété — ${{ steps.progress.outputs.done }} / ${{ steps.progress.outputs.total }} tâches</div>
                    <div style="font-size:13px;font-weight:700;color:${{ steps.style.outputs.color }};margin-top:6px;">${{ steps.style.outputs.emoji }} Phase : ${{ steps.style.outputs.phase }}</div>
                  </div>

                  <!-- Progress bar -->
                  <div style="margin-bottom:32px;">
                    <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:6px;">
                      <span>Démarrage</span><span>MVP Complet</span>
                    </div>
                    <div style="height:16px;background:#e2e8f0;border-radius:999px;overflow:hidden;">
                      <div style="height:100%;width:${{ steps.progress.outputs.pct }}%;background:linear-gradient(90deg,${{ steps.style.outputs.color }},#4ade80);border-radius:999px;transition:width 1s;"></div>
                    </div>
                  </div>

                  <!-- Stats -->
                  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:32px;">
                    <div style="background:#f1f5f9;border-radius:12px;padding:16px;text-align:center;">
                      <div style="font-size:28px;font-weight:800;color:#1d4ed8;">${{ steps.progress.outputs.done }}</div>
                      <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;">Terminées</div>
                    </div>
                    <div style="background:#f1f5f9;border-radius:12px;padding:16px;text-align:center;">
                      <div style="font-size:28px;font-weight:800;color:#d97706;">${{ steps.progress.outputs.todo }}</div>
                      <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;">Restantes</div>
                    </div>
                    <div style="background:#f1f5f9;border-radius:12px;padding:16px;text-align:center;">
                      <div style="font-size:28px;font-weight:800;color:#6d28d9;">${{ steps.progress.outputs.total }}</div>
                      <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;">Total</div>
                    </div>
                  </div>

                  <!-- Commit info -->
                  <div style="background:#f8fafc;border-radius:10px;padding:14px 18px;margin-bottom:28px;border-left:4px solid ${{ steps.style.outputs.color }};">
                    <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Dernière mise à jour</div>
                    <div style="font-size:14px;font-weight:600;color:#1e293b;">${{ steps.progress.outputs.msg }}</div>
                    <div style="font-size:12px;color:#94a3b8;margin-top:4px;">Par ${{ steps.progress.outputs.author }} · Le ${{ steps.progress.outputs.date }}</div>
                  </div>

                  <!-- CTA Button -->
                  <div style="text-align:center;">
                    <a href="https://yanrooven.fr/jpslogistics/"
                       style="display:inline-block;background:linear-gradient(135deg,#1d4ed8,#6d28d9);color:white;padding:16px 32px;border-radius:12px;text-decoration:none;font-weight:700;font-size:16px;box-shadow:0 4px 16px rgba(29,78,216,0.4);">
                      📊 Voir la progression en détail →
                    </a>
                  </div>

                  <div style="text-align:center;margin-top:16px;">
                    <a href="https://yanrooven.fr/jpslogistics/plan.html"
                       style="color:#1d4ed8;text-decoration:none;font-size:13px;">
                      📄 Voir le plan technique complet
                    </a>
                  </div>

                </div>

                <!-- Footer -->
                <div style="text-align:center;padding:20px;color:#94a3b8;font-size:12px;">
                  Email automatique généré par GitHub Actions · LogiSaaS Platform<br>
                  Pour vous désabonner, contactez l'équipe de développement.
                </div>

              </div>
            </body>
            </html>
